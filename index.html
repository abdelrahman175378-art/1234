<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AK Modern Fashion | Luxury Collection Qatar</title>
    <meta name="description" content="Discover the pinnacle of modern luxury fashion in Qatar. Premium streetwear, elegant collections, and personalized AI styling.">
    <meta name="keywords" content="Fashion Qatar, Luxury Boutique Doha, Streetwear Qatar, AK Modern, AI Fashion Stylist">
    
    <!-- --- ARCHIVAL IDENTITY ICONS (FAVICON) --- -->
    <!-- تأكد من نقل الملف لمجلد public لكي تعمل هذه الروابط -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon.ico">

    <!-- --- PROGRESSIVE WEB APP (PWA) PROTOCOL --- -->
    <link rel="manifest" href="/manifest.json">

    <!-- Mobile App Experience Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://akmodern.qa/">
    <meta property="og:title" content="AK Modern Fashion | Premium Luxury Qatar">
    <meta property="og:description" content="Free delivery across Qatar. Shop the latest in modern luxury and streetwear.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1469334031218-e382a71b716b?q=80&w=1200">

    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
          --safe-area-inset-top: env(safe-area-inset-top);
          --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        html {
          scroll-behavior: smooth;
          width: 100%;
          height: 100%;
        }

        body { 
          font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
          background-color: #ffffff;
          overflow-x: hidden;
          -webkit-tap-highlight-color: transparent;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
          width: 100%;
          min-height: 100vh;
        }

        .arabic { font-family: 'Noto Sans Arabic', sans-serif; direction: rtl; }
        
        /* Premium Mesh Background */
        .bg-mesh {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: -2;
          background-color: #ffffff;
          background-image: 
            radial-gradient(at 0% 0%, hsla(0, 100%, 98%, 1) 0, transparent 50%), 
            radial-gradient(at 50% 0%, hsla(210, 20%, 98%, 1) 0, transparent 50%), 
            radial-gradient(at 100% 0%, hsla(338, 50%, 98%, 1) 0, transparent 50%);
          animation: meshMove 20s ease-in-out infinite alternate;
          will-change: transform;
        }

        @keyframes meshMove {
          0% { transform: scale(1); }
          100% { transform: scale(1.1); }
        }

        /* Responsive Branding Background */
        .ak-sign-container {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          z-index: -1;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
        }

        .ak-sign {
          font-size: 60vw;
          font-weight: 900;
          line-height: 1;
          letter-spacing: -0.05em;
          background: linear-gradient(135deg, rgba(0,0,0,0.03) 0%, rgba(0,0,0,0.01) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          user-select: none;
          white-space: nowrap;
          transform: rotate(-10deg);
          animation: floatSign 15s ease-in-out infinite alternate;
          will-change: transform;
        }

        /* Mobile specific background adjustments */
        @media (max-width: 768px) {
          .ak-sign {
            font-size: 80vw;
            opacity: 0.5;
          }
        }

        @keyframes floatSign {
          from { transform: rotate(-10deg) translateY(-20px) scale(1); }
          to { transform: rotate(-8deg) translateY(20px) scale(1.05); }
        }

        /* Scrollbar customization */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #000; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes scan { 0% { top: 0% } 100% { top: 100% } }
        .animate-scan { animation: scan 2s ease-in-out infinite alternate; }

        /* Support for long content on mobile */
        #root {
          width: 100%;
          position: relative;
          z-index: 10;
        }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.463.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
        "xlsx": "https://esm.sh/xlsx@0.18.5",
        "jspdf": "https://esm.sh/jspdf@2.5.1",
        "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.5.25"
      }
    }
    </script>
    <link rel="stylesheet" href="/index.css">
</head>
<body class="text-gray-900 selection:bg-black selection:text-white">
    <!-- Matrix Foundation Layer -->
    <div class="bg-mesh"></div>
    <div class="ak-sign-container">
        <div class="ak-sign">AK</div>
    </div>
    
    <!-- Application Neural Interface Root -->
    <div id="root"></div>

    <!-- Core Application Entry Script -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
